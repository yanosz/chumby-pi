# Cross-compilation to the Raspberry Pi (aarch64). Lives at the monorepo
# root (NOT inside ruffle/) so the fork stays upstream-clean; cargo merges
# this config when invoked from ruffle/.
#
# Requires (dev box):
#   rustup target add aarch64-unknown-linux-gnu
#   sudo dpkg --add-architecture arm64 && sudo apt-get update
#   sudo apt-get install gcc-aarch64-linux-gnu libasound2-dev:arm64 \
#        libudev-dev:arm64 libssl-dev:arm64 libwayland-dev:arm64
#
# Build: cd ruffle && cargo build --release -p ruffle_desktop \
#        --features chumby --target aarch64-unknown-linux-gnu

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[env]
# pkg-config for *-sys build scripts: cross mode, arm64 multiarch tree
# only. The target-suffixed names are read by the pkg-config crate for
# aarch64 builds exclusively, so amd64 host builds are unaffected.
PKG_CONFIG_ALLOW_CROSS_aarch64-unknown-linux-gnu = "1"
PKG_CONFIG_LIBDIR_aarch64-unknown-linux-gnu = "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
