name: CI

# Acceptance for chumby-pi: the deb builds on arm64 with zero .swf
# inputs, installs — with every dependency declared — on the Raspberry
# Pi OS base (arm64 debian:trixie container), and the launcher behaves:
# refuses helpfully without controlpanel.swf, starts the movie from an
# owner-copied one.
#
# controlpanel.swf is copyrighted chumby firmware and never enters any
# package or artifact. The movie-start part of the install test needs
# it, so it is skipped by default: only on push to main (and manual
# dispatch) is the SWF fetched from a private Nextcloud share
# (RCLONE_CONFIG_RSHARE_* Actions secrets) and mounted into the test
# container read-only.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debs:
    name: Build debs (arm64) and install-test on trixie
    runs-on: ubuntu-24.04-arm
    steps:
      # The chumby-ruffle submodule is public (user decision
      # 2026-07-07), so the default token clones it fine; this repo
      # itself stays private.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libfontconfig-dev rclone

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruffle

      - name: Build ruffle_desktop (dist profile)
        working-directory: ruffle
        # --target keeps the output at the path build-debs.sh expects
        # (target/aarch64-unknown-linux-gnu/dist/), same as the
        # cross-build documented in claude-docs/development.md §3.
        # There is no --features chumby: the fork always builds it.
        run: |
          cargo build -p ruffle_desktop \
            --profile dist --target aarch64-unknown-linux-gnu

      - name: Fetch controlpanel.swf from the private share
        if: github.event_name != 'pull_request'
        env:
          RCLONE_CONFIG_RSHARE_TYPE: webdav
          RCLONE_CONFIG_RSHARE_VENDOR: nextcloud
          RCLONE_CONFIG_RSHARE_URL: ${{ secrets.RCLONE_CONFIG_RSHARE_URL }}
          RCLONE_CONFIG_RSHARE_USER: ${{ secrets.RCLONE_CONFIG_RSHARE_USER }}
          RCLONE_CONFIG_RSHARE_PASS: ${{ secrets.RCLONE_CONFIG_RSHARE_PASS }}
        run: |
          rclone copy rshare:testdata/controlpanel.swf ruffle/swf-assets/
          test -f ruffle/swf-assets/controlpanel.swf

      - name: Build the deb (no .swf involved)
        run: pkg/build-debs.sh

      - name: Install and run the deb in an arm64 trixie container
        run: |
          docker run --rm \
            -v "$PWD/pkg/out:/debs:ro" \
            -v "$PWD/ruffle/swf-assets:/swf:ro" \
            -v "$PWD/.github/scripts/deb-install-test.sh:/deb-install-test.sh:ro" \
            debian:trixie /bin/sh /deb-install-test.sh

      - name: Upload chumby-player deb
        uses: actions/upload-artifact@v4
        with:
          name: chumby-player-deb
          path: pkg/out/chumby-player_*.deb
          if-no-files-found: error

  apt-repo:
    # Signed flat apt repo on GitHub Pages (design.md §5). Only the
    # SWF-free chumby-player deb enters it — the deb is audited for
    # leaked .swf by the install test this job depends on.
    name: Publish the apt repo to GitHub Pages
    needs: debs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: chumby-player-deb
          path: repo

      - name: Build and sign the flat repo
        env:
          GPG_KEY: ${{ secrets.CHUMBY_APT_GPG_KEY }}
        run: |
          test -n "$GPG_KEY" || { echo "CHUMBY_APT_GPG_KEY secret missing" >&2; exit 1; }
          echo "$GPG_KEY" | gpg --batch --import
          cp pkg/apt/chumby-archive.gpg pkg/apt/index.html repo/
          cd repo
          apt-ftparchive packages . > Packages
          gzip -9k Packages
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=chumby-pi \
            -o APT::FTPArchive::Release::Label=chumby-pi \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Architectures=arm64 \
            -o "APT::FTPArchive::Release::Description=Chumby control panel for Raspberry Pi" \
            release . > Release
          gpg --batch --yes --clearsign -o InRelease Release
          gpg --batch --yes -abs -o Release.gpg Release
          ls -l

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - id: deploy
        uses: actions/deploy-pages@v4
